<!DOCTYPE html>
<html>
<head>
  <title>Padding Example 3</title>
  <style>
    .container {
      background-color: yellow;
      padding: 10px;
    }
    .content {
      background-color: white;
      border: 5px solid black;
      padding: 30px;  
      margin: 20px;  
    }
  </style>
</head>
<body>
<div class="container">
  <div class="content">
    Notice how padding adds space inside the border, while margin moves the box away.
  </div>
</div>
</body>
</html>
