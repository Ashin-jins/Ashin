<!DOCTYPE html>
<html>
<head>
  <title>Card</title>
  <style>
    .card {
      width: 200px;
      margin: 20px;        
      padding: 10px;      
      border: 1px solid black;
      text-align: center;
    }
    img {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png">
    <p>JavaScript</p>
    <a href="https://en.wikipedia.org/wiki/JavaScript">Link</a>
  </div>
</body>
</html>
