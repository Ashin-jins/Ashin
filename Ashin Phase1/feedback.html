<!DOCTYPE html>
<html>
<head>
    <title>Service Feedback</title>
</head>
<body>

    <h2>Product Feedback</h2>
    
    <form>
        <label>How would you rate us?</label>
        <br>
        <select name="user_rating">
            <option value="excellent">5 Stars - Excellent</option>
            <option value="good">4 Stars - Good</option>
            <option value="average">3 Stars - Average</option>
            <option value="poor">2 Stars - Poor</option>
            <option value="very_poor">1 Star - Very Poor</option>
        </select>

        <br><br>

        <label>Tell us more:</label>
        <br>
        <textarea name="feedback_text" rows="6" cols="35" placeholder="Type your review here..."></textarea>

        <br><br>

        <input type="submit" value="Submit My Review">
    </form>

</body>
</html>
