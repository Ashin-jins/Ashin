<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Library Access</title>
</head>
<body>

    <header>
        <h1>Library Member Login</h1>
        <p>Enter your credentials to access the digital archives.</p>
    </header>
    <hr>

    <form>
        <fieldset style="width: 300px;">
            <legend><b>Security Gateway</b></legend>
            <br>
            
            <label for="uid">Member ID / Username:</label><br>
            <input type="text" id="uid" name="uid" placeholder="e.g. LIB-9988" required>
            <br><br>

            <label for="p-code">Secret Access Key:</label><br>
            <input type="password" id="p-code" name="p-code" required>
            <br><br>

            <input type="submit" value="Authenticate Login">

            <input type="reset" value="Abort & Cancel">
            
        </fieldset>
    </form>

    <br>
    

</body>
</html>
