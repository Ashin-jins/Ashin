<!DOCTYPE html>
<html>
<head>
  <title>Flex Demo</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      padding: 20px;
    }
    h3 {
      color: #333;
    }
    .container {
      display: flex;
      flex-direction: row;
      justify-content: space-between; 
      align-items: center;
      height: 100px;
      background: #dfe6e9;
      padding: 10px;
      margin-bottom: 20px;
    }
    .box {
      background: #0984e3;
      color: white;
      padding: 15px;
    }
    .column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #ffeaa7;
      padding: 10px;
      width: 150px;
    }
  </style>
</head>
<body>
<h3>Row Layout</h3>
<div class="container">
  <div class="box">A</div>
  <div class="box">B</div>
  <div class="box">C</div>
</div>
<h3>Column Layout</h3>
<div class="column">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>
</body>
</html>
