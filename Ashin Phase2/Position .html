<!DOCTYPE html>
<html>
<head>
  <title>Position Example</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      padding-top: 50px;
    }
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
    }
    .container {
      position: relative;
      width: 220px;
      margin: 30px;
    }
    .container img {
      width: 100%;
    }
    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 5px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="navbar">Fixed Navbar</div>
  <div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png" alt="image">
    <div class="badge">NEW</div>
  </div>
</body>
</html>
