<!DOCTYPE html>
<html>
<head>
  <title>Padding Example 2</title>
  <style>
    .box1 {
      background-color: pink;
      padding: 30px;
      margin-bottom: 40px;
    }
    .box2 {
      background-color: lightgreen;
      padding: 10px;
    }
  </style>
</head>
<body>
<div class="box1">Box 1 (More padding)</div>
<div class="box2">Box 2 (Less padding)</div>
</body>
</html>
